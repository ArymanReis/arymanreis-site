<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- Meta Básico -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Links — Aryman Reis</title>

    <meta name="description"
        content="Todos os links do Aryman Reis: cursos, conteúdo e redes sociais.">

    <meta name="author" content="Aryman Reis">

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/icons/icon-aryman.ico" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/footer.css">
    <link rel="stylesheet" href="./css/links-bio.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DJQT0X3ZKF"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-DJQT0X3ZKF');
    </script>

    <!-- Hooks para pixels (configuração futura) -->
    <!-- Google Ads Pixel: inserir aqui -->
    <!-- Facebook Pixel: inserir aqui -->

    <script src="./js/analytics.js" defer></script>
    <script src="./js/links-bio.js" defer></script>

</head>

<body class="links-bio-page">

<!-- ==========================================
     HEADER
========================================== -->
<header class="header">
    <div class="container">
        <div class="header__content">

            <a href="#" class="header__logo">
                <img src="./assets/icons/logo-aryman-reis.svg" alt="Aryman Reis">
            </a>

        </div>
    </div>
</header>

<main>

<!-- ==========================================
     LINKS BIO
========================================== -->
<section class="links-bio">
    <div class="container">

        <!-- Citação / hero -->
        <div class="links-bio__hero">
            <p class="links-bio__eyebrow" id="lb-greeting">Olá! 👋</p>
            <p class="links-bio__quote">Transformo líderes operacionais<br>em líderes estratégicos.</p>
            <p class="links-bio__author">— Aryman Reis</p>
        </div>

        <!-- Cards de links -->
        <ul class="links-bio__list">

            <!-- Painel do Gerente Notável -->
            <li>
                <a href="https://arymanreis.com.br/painel-de-gerente-de-loja-notavel.html"
                   class="links-bio__card"
                   onclick="gtag('event', 'links_bio_click', { link_name: 'painel_gerente_notavel' })">
                    <div class="links-bio__card-icon-wrap">
                        <img
                            class="links-bio__card-icon--gerente"
                            src="./assets/logos/gerente-notavel.svg"
                            alt="Painel do Gerente Notável">
                    </div>
                    <span class="links-bio__card-title">Painel do Gerente Notável</span>
                </a>
            </li>

            <!-- Site Oficial -->
            <li>
                <a href="https://arymanreis.com.br"
                   class="links-bio__card"
                   onclick="gtag('event', 'links_bio_click', { link_name: 'site_oficial' })">
                    <img
                        class="links-bio__card-icon--logo"
                        src="./assets/icons/logo-aryman-reis.svg"
                        alt="Aryman Reis">
                    <span class="links-bio__card-title">Site Oficial</span>
                </a>
            </li>

            <!-- YouTube -->
            <li>
                <a href="https://www.youtube.com/@arymanreis"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="links-bio__card links-bio__card--youtube"
                   onclick="gtag('event', 'links_bio_click', { link_name: 'youtube' })">
                    <img
                        class="links-bio__card-icon--youtube"
                        src="./assets/logos/youtube-logo.svg"
                        alt="YouTube">
                    <span class="links-bio__card-title">YouTube</span>
                </a>
            </li>

        </ul>

    </div>
</section>

</main>

<!-- ==========================================
     FOOTER
========================================== -->
<footer class="footer">
    <div class="container">
        <div class="footer__content">
            <p class="footer__copyright">&copy; 2026 Aryman Reis. Todos os direitos reservados.</p>
        </div>
    </div>
</footer>

</body>
</html>
